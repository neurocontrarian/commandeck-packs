version = 1

[pack]
pack_id = "windows-essentials"
name = "Windows Essentials"
pack_ver = "1.5.0"
os = "windows"
category = "Windows Essentials"
description = "Core system info, logs and maintenance actions."
tags = [
    "defaults",
    "essentials",
]

[[button]]
id = "system-info"
name = "System Info"
command = "Get-ComputerInfo | Select-Object CsName, WindowsProductName, WindowsVersion, OsArchitecture, CsManufacturer, CsModel, @{N='RAM(GB)';E={[math]::Round($_.CsTotalPhysicalMemory/1GB,1)}} | Format-List"
icon_name = "info-circle"
color = "#f9f06b"
tooltip = "Show Windows edition, version, hardware model and total memory"
show_output = true
timeout = 60
category = "Windows Essentials"
os = "windows"

[[button]]
id = "running-services"
name = "Running Services"
command = "Get-Service | Where-Object Status -eq 'Running' | Sort-Object DisplayName | Format-Table Status, Name, DisplayName -AutoSize"
icon_name = "server"
color = "#dc8add"
tooltip = "List all Windows services that are currently running"
show_output = true
category = "Windows Essentials"
os = "windows"

[[button]]
id = "system-events"
name = "System Events"
command = "Get-EventLog -LogName System -Newest 20 -EntryType Error, Warning | Format-Table TimeGenerated, EntryType, Source, EventID -AutoSize"
icon_name = "journal-text"
color = "#ffa348"
tooltip = "Show the 20 most recent System event-log errors and warnings"
show_output = true
category = "Windows Essentials"
os = "windows"

[[button]]
id = "restart-explorer"
name = "Restart Explorer"
command = "Stop-Process -Name explorer -Force; Start-Sleep -Seconds 2; if (-not (Get-Process -Name explorer -ErrorAction SilentlyContinue)) { Start-Process explorer }; Write-Output 'Explorer restarted.'"
icon_name = "arrow-clockwise"
color = "#f8e45c"
tooltip = "Restart Windows Explorer (taskbar and desktop) to clear display glitches"
show_output = true
confirm_before_run = true
category = "Windows Essentials"
os = "windows"

[[button]]
id = "empty-recycle-bin"
name = "Empty Recycle Bin"
command = "Clear-RecycleBin -Force -ErrorAction SilentlyContinue; Write-Output 'Recycle Bin emptied.'"
icon_name = "trash"
color = "#865e3c"
tooltip = "Permanently delete all files in the Recycle Bin"
show_output = true
confirm_before_run = true
category = "Windows Essentials"
os = "windows"

[[button]]
id = "reboot"
name = "Reboot"
command = "Restart-Computer -Force"
icon_name = "arrow-clockwise"
color = "#f8e45c"
tooltip = "Reboot the system immediately"
show_output = true
confirm_before_run = true
category = "Windows Essentials"
os = "windows"

[[button]]
id = "shutdown"
name = "Shutdown"
command = "Stop-Computer -Force"
icon_name = "power"
color = "#f66151"
tooltip = "Power off the system immediately"
show_output = true
confirm_before_run = true
category = "Windows Essentials"
os = "windows"
