version = 1

[pack]
pack_id = "macos-network"
name = "Network"
pack_ver = "1.3.0"
os = "macos"
category = "Network"
description = "Interfaces, ports and connection diagnostics."
tags = [
    "defaults",
    "network",
]

[[button]]
id = "network-interfaces"
name = "Network Interfaces"
command = "ifconfig"
icon_name = "ethernet"
color = "#62a0ea"
tooltip = "Show all network interfaces and their IP addresses"
show_output = true
category = "Network"
os = "macos"

[[button]]
id = "active-connections"
name = "Active Connections"
command = "lsof -nP -iTCP -sTCP:ESTABLISHED"
icon_name = "plug"
color = "#57e389"
tooltip = "Show all active TCP connections and the processes using them"
show_output = true
category = "Network"
os = "macos"

[[button]]
id = "open-ports"
name = "Open Ports"
command = "lsof -nP -i -sTCP:LISTEN"
icon_name = "broadcast"
color = "#57e389"
tooltip = "List all open TCP/UDP ports and the processes using them"
show_output = true
category = "Network"
os = "macos"

[[button]]
id = "ping"
name = "Ping"
command = "ping -c 4 8.8.8.8"
icon_name = "wifi"
color = "#62a0ea"
tooltip = "Send 4 test packets to a public server to check internet connectivity"
show_output = true
category = "Network"
os = "macos"

[[button]]
id = "wifi-info"
name = "Wi-Fi Info"
command = "networksetup -getairportnetwork en0 2>/dev/null; echo; networksetup -getinfo Wi-Fi"
icon_name = "wifi"
color = "#62a0ea"
tooltip = "Show the current Wi-Fi network, IP address and router"
show_output = true
category = "Network"
os = "macos"
