version = 1

[pack]
pack_id = "macos-hardware"
name = "Hardware"
pack_ver = "1.4.0"
os = "macos"
category = "Hardware"
description = "Disk, memory, CPU, GPU and other hardware checks."
tags = [
    "defaults",
    "hardware",
]

[[button]]
id = "disk-usage"
name = "Disk Usage"
command = "df -h"
icon_name = "hdd"
color = "#99c1f1"
tooltip = "Show disk space usage for all mounted filesystems"
show_output = true
category = "Hardware"
os = "macos"

[[button]]
id = "memory-usage"
name = "Memory Usage"
command = "echo \"Total RAM: $(( $(sysctl -n hw.memsize) / 1073741824 )) GB\"; top -l 1 | grep PhysMem; echo; sysctl vm.swapusage"
icon_name = "memory"
color = "#8ff0a4"
tooltip = "Show total, used and free RAM and swap memory"
show_output = true
category = "Hardware"
os = "macos"

[[button]]
id = "cpu-load"
name = "CPU Load"
command = "uptime && echo && top -l 1 -o cpu -n 10 -stats pid,command,cpu,mem"
icon_name = "cpu"
color = "#ffbe6f"
tooltip = "Show system uptime, load averages and top CPU processes"
show_output = true
category = "Hardware"
os = "macos"

[[button]]
id = "temperature"
name = "Temperature"
command = "pmset -g therm; echo; echo 'macOS does not expose exact temperatures to apps. For live readings, open Activity Monitor or run: sudo powermetrics -n 1 --samplers thermal'"
icon_name = "thermometer-half"
color = "#ff7800"
tooltip = "Show thermal pressure and CPU speed limits (macOS hides exact temperatures)"
show_output = true
category = "Hardware"
os = "macos"

[[button]]
id = "battery"
name = "Battery"
command = "pmset -g batt"
icon_name = "plug"
color = "#57e389"
tooltip = "Show battery charge level and power source"
show_output = true
category = "Hardware"
os = "macos"

[[button]]
id = "block-devices"
name = "Disks & Volumes"
command = "diskutil list"
icon_name = "stack"
color = "#cdab8f"
tooltip = "List all disks, partitions and volumes"
show_output = true
category = "Hardware"
os = "macos"

[[button]]
id = "largest-directories"
name = "Largest Directories"
command = "du -sh ~/* ~/Library 2>/dev/null | sort -rh | head -15"
icon_name = "folder2"
color = "#e5a50a"
tooltip = "Show the 15 largest folders in your home directory by disk usage"
show_output = true
timeout = 120
category = "Hardware"
os = "macos"

[[button]]
id = "disk-io"
name = "Disk I/O"
command = "iostat -d -c 3 -w 1"
icon_name = "hdd"
color = "#cdab8f"
tooltip = "Show disk read/write activity (3 one-second samples)"
show_output = true
category = "Hardware"
os = "macos"

[[button]]
id = "ncdu"
name = "NCDU"
command = "export PATH=\"$PATH:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin\"; if command -v ncdu >/dev/null; then ncdu /; else echo \"ncdu is not installed.\"; if command -v brew >/dev/null; then read -rp \"Install ncdu with Homebrew now? [y/N] \" a; case \"$a\" in [yY]*) brew install ncdu && ncdu /;; *) echo \"Skipped.\";; esac; else echo \"Homebrew is not installed - get it at https://brew.sh, then run: brew install ncdu\"; fi; fi"
icon_name = "hdd"
color = "#3584e4"
tooltip = "Interactive disk usage analyzer (requires ncdu)"
execution_mode = "terminal"
category = "Hardware"
os = "macos"

[[button]]
id = "btop"
name = "btop"
command = "export PATH=\"$PATH:/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/local/sbin\"; if command -v btop >/dev/null; then btop; else echo \"btop is not installed.\"; if command -v brew >/dev/null; then read -rp \"Install btop with Homebrew now? [y/N] \" a; case \"$a\" in [yY]*) brew install btop && btop;; *) echo \"Skipped.\";; esac; else echo \"Homebrew is not installed - get it at https://brew.sh, then run: brew install btop\"; fi; fi"
icon_name = "activity"
color = "#5e5c64"
tooltip = "Interactive resource monitor (requires btop)"
execution_mode = "terminal"
category = "Hardware"
os = "macos"

[[button]]
id = "hardware-info"
name = "Hardware Info"
command = "system_profiler SPHardwareDataType SPDisplaysDataType SPStorageDataType"
icon_name = "cpu"
color = "#3584e4"
tooltip = "Show Mac model, chip, memory, graphics and storage in one report"
show_output = true
timeout = 60
category = "Hardware"
os = "macos"
