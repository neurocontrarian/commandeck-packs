version = 1

[pack]
pack_id = "macos-essentials"
name = "macOS Essentials"
pack_ver = "1.4.0"
os = "macos"
category = "macOS Essentials"
description = "Core system info, logs and maintenance actions."
tags = [
    "defaults",
    "essentials",
]

[[button]]
id = "running-processes"
name = "Running Processes"
command = "ps aux | head -1; ps aux | tail -n +2 | sort -nrk 3 | head -19"
icon_name = "activity"
color = "#dc8add"
tooltip = "List top 20 processes sorted by CPU usage"
show_output = true
category = "macOS Essentials"
os = "macos"

[[button]]
id = "system-info"
name = "System Info"
command = "sw_vers && echo && uname -a"
icon_name = "info-circle"
color = "#f9f06b"
tooltip = "Show macOS version and kernel information"
show_output = true
category = "macOS Essentials"
os = "macos"

[[button]]
id = "logged-in-users"
name = "Logged-in Users"
command = "w"
icon_name = "people"
color = "#c061cb"
tooltip = "Show who is logged in and what they are doing"
show_output = true
category = "macOS Essentials"
os = "macos"

[[button]]
id = "last-logins"
name = "Last Logins"
command = "last | head -20"
icon_name = "person-check"
color = "#9141ac"
tooltip = "Show the 20 most recent logins and reboots"
show_output = true
category = "macOS Essentials"
os = "macos"

[[button]]
id = "failed-services"
name = "Failed Services"
command = "launchctl list | awk 'NR==1 || $2+0 != 0'"
icon_name = "exclamation-triangle"
color = "#f66151"
tooltip = "List launchd services whose last run ended in an error"
show_output = true
category = "macOS Essentials"
os = "macos"

[[button]]
id = "system-journal"
name = "System Log"
command = "log show --last 5m --style compact 2>/dev/null | tail -n 50"
icon_name = "journal-text"
color = "#ffa348"
tooltip = "Show the last 50 system log messages from the last 5 minutes"
show_output = true
timeout = 60
category = "macOS Essentials"
os = "macos"

[[button]]
id = "kernel-messages"
name = "Kernel Messages"
command = "log show --last 30m --predicate 'process == \"kernel\"' --style compact 2>/dev/null | tail -n 30"
icon_name = "cpu"
color = "#ffa348"
tooltip = "Show recent kernel log messages (hardware, drivers)"
show_output = true
timeout = 60
category = "macOS Essentials"
os = "macos"

[[button]]
id = "clear-trash"
name = "Clear Trash"
command = "osascript -e 'tell application \"Finder\" to empty trash' && echo 'Trash emptied.' || echo 'Could not empty the Trash - allow Commandeck to control Finder in System Settings > Privacy & Security > Automation.'"
icon_name = "trash"
color = "#865e3c"
tooltip = "Permanently delete all files in the Trash"
show_output = true
confirm_before_run = true
category = "macOS Essentials"
os = "macos"

[[button]]
id = "system-update"
name = "System Update"
command = "sudo softwareupdate -i -a"
icon_name = "cloud-download"
color = "#62a0ea"
tooltip = "Check for and install macOS software updates (asks for your password)"
confirm_before_run = true
execution_mode = "terminal"
category = "macOS Essentials"
os = "macos"

[[button]]
id = "reboot"
name = "Reboot"
command = "osascript -e 'tell application \"System Events\" to restart'"
icon_name = "arrow-clockwise"
color = "#f8e45c"
tooltip = "Reboot the system immediately"
confirm_before_run = true
category = "macOS Essentials"
os = "macos"

[[button]]
id = "shutdown"
name = "Shutdown"
command = "osascript -e 'tell application \"System Events\" to shut down'"
icon_name = "power"
color = "#f66151"
tooltip = "Power off the system immediately"
confirm_before_run = true
category = "macOS Essentials"
os = "macos"
