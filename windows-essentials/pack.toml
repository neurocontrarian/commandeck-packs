version = 1

[pack]
pack_id = "windows-essentials"
name = "Windows Essentials"
pack_ver = "1.0.0"
os = "windows"
category = ""
description = "The built-in system, hardware and network buttons for Windows targets (PowerShell)."
tags = [
    "essentials",
    "defaults",
    "system",
]

[[button]]
id = "disk-usage"
name = "Disk Usage"
command = "Get-PSDrive -PSProvider FileSystem"
icon_name = "hdd"
color = "#99c1f1"
tooltip = "Show disk space usage for all mounted filesystems"
show_output = true
category = "Hardware"
os = "windows"

[[button]]
id = "memory-usage"
name = "Memory Usage"
command = "Get-CimInstance Win32_OperatingSystem | Select-Object @{N='TotalRAM(GB)';E={[math]::Round($_.TotalVisibleMemorySize/1MB,2)}}, @{N='FreeRAM(GB)';E={[math]::Round($_.FreePhysicalMemory/1MB,2)}} | Format-List"
icon_name = "memory"
color = "#8ff0a4"
tooltip = "Show total, used and free RAM and swap memory"
show_output = true
category = "Hardware"
os = "windows"

[[button]]
id = "cpu-load"
name = "CPU Load"
command = "Get-Process | Sort-Object CPU -Descending | Select-Object -First 15 Name, Id, CPU, @{N='Mem(MB)';E={[math]::Round($_.WS/1MB,1)}} | Format-Table -AutoSize"
icon_name = "cpu"
color = "#ffbe6f"
tooltip = "List the 15 processes using the most CPU"
show_output = true
category = "Hardware"
os = "windows"

[[button]]
id = "network-interfaces"
name = "Network Interfaces"
command = "Get-NetIPAddress | Where-Object AddressState -eq 'Preferred' | Sort-Object InterfaceAlias | Format-Table InterfaceAlias, IPAddress, AddressFamily, PrefixLength -AutoSize"
icon_name = "ethernet"
color = "#62a0ea"
tooltip = "Show all network interfaces and their IP addresses"
show_output = true
category = "Network"
os = "windows"

[[button]]
id = "open-ports"
name = "Open Ports"
command = "Get-NetTCPConnection -State Listen | Sort-Object LocalPort | Select-Object LocalAddress, LocalPort, OwningProcess, @{N='Process';E={(Get-Process -Id $_.OwningProcess -ErrorAction SilentlyContinue).Name}} | Format-Table -AutoSize"
icon_name = "broadcast"
color = "#57e389"
tooltip = "List all open TCP/UDP ports and the processes using them"
show_output = true
category = "Network"
os = "windows"

[[button]]
id = "active-connections"
name = "Active Connections"
command = "Get-NetTCPConnection -State Established | Select-Object LocalAddress, LocalPort, RemoteAddress, RemotePort, @{N='Process';E={(Get-Process -Id $_.OwningProcess -ErrorAction SilentlyContinue).Name}} | Format-Table -AutoSize"
icon_name = "plug"
color = "#57e389"
tooltip = "Show all active TCP connections and the processes using them"
show_output = true
category = "Network"
os = "windows"

[[button]]
id = "ping"
name = "Ping"
command = "ping 8.8.8.8"
icon_name = "wifi"
color = "#62a0ea"
tooltip = "Send 4 test packets to a public server to check internet connectivity"
show_output = true
category = "Network"
os = "windows"

[[button]]
id = "system-info"
name = "System Info"
command = "Get-ComputerInfo | Select-Object CsName, WindowsProductName, WindowsVersion, OsArchitecture, CsManufacturer, CsModel, @{N='RAM(GB)';E={[math]::Round($_.CsTotalPhysicalMemory/1GB,1)}} | Format-List"
icon_name = "info-circle"
color = "#f9f06b"
tooltip = "Show Windows edition, version, hardware model and total memory"
show_output = true
timeout = 60
category = "Windows Essentials"
os = "windows"

[[button]]
id = "running-services"
name = "Running Services"
command = "Get-Service | Where-Object Status -eq 'Running' | Sort-Object DisplayName | Format-Table Status, Name, DisplayName -AutoSize"
icon_name = "server"
color = "#dc8add"
tooltip = "List all Windows services that are currently running"
show_output = true
category = "Windows Essentials"
os = "windows"

[[button]]
id = "system-events"
name = "System Events"
command = "Get-EventLog -LogName System -Newest 20 -EntryType Error, Warning | Format-Table TimeGenerated, EntryType, Source, EventID -AutoSize"
icon_name = "journal-text"
color = "#ffa348"
tooltip = "Show the 20 most recent System event-log errors and warnings"
show_output = true
category = "Windows Essentials"
os = "windows"

[[button]]
id = "restart-explorer"
name = "Restart Explorer"
command = "Stop-Process -Name explorer -Force; Start-Sleep -Seconds 2; if (-not (Get-Process -Name explorer -ErrorAction SilentlyContinue)) { Start-Process explorer }; Write-Output 'Explorer restarted.'"
icon_name = "arrow-clockwise"
color = "#f8e45c"
tooltip = "Restart Windows Explorer (taskbar and desktop) to clear display glitches"
show_output = true
confirm_before_run = true
category = "Windows Essentials"
os = "windows"

[[button]]
id = "empty-recycle-bin"
name = "Empty Recycle Bin"
command = "Clear-RecycleBin -Force -ErrorAction SilentlyContinue; Write-Output 'Recycle Bin emptied.'"
icon_name = "trash"
color = "#865e3c"
tooltip = "Permanently delete all files in the Recycle Bin"
show_output = true
confirm_before_run = true
category = "Windows Essentials"
os = "windows"

[[button]]
id = "reboot"
name = "Reboot"
command = "Restart-Computer -Force"
icon_name = "arrow-clockwise"
color = "#f8e45c"
tooltip = "Reboot the system immediately"
show_output = true
confirm_before_run = true
category = "Windows Essentials"
os = "windows"

[[button]]
id = "shutdown"
name = "Shutdown"
command = "Stop-Computer -Force"
icon_name = "power"
color = "#f66151"
tooltip = "Power off the system immediately"
show_output = true
confirm_before_run = true
category = "Windows Essentials"
os = "windows"
