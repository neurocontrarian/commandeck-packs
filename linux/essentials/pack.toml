version = 1

[pack]
pack_id = "linux-essentials"
name = "Linux Essentials"
pack_ver = "1.6.0"
os = "linux"
category = "Linux Essentials"
description = "Core system info, logs and maintenance actions."
tags = [
    "defaults",
    "essentials",
]

[[button]]
id = "running-processes"
name = "Running Processes"
command = "ps aux --sort=-%cpu | head -20"
icon_name = "activity"
color = "#dc8add"
tooltip = "List top 20 processes sorted by CPU usage"
show_output = true
category = "Linux Essentials"
os = "linux"

[[button]]
id = "system-info"
name = "System Info"
command = "uname -a && echo && lsb_release -a 2>/dev/null || cat /etc/os-release"
icon_name = "info-circle"
color = "#f9f06b"
tooltip = "Show kernel version and Linux distribution information"
show_output = true
category = "Linux Essentials"
os = "linux"

[[button]]
id = "logged-in-users"
name = "Logged-in Users"
command = "w"
icon_name = "people"
color = "#c061cb"
tooltip = "Show who is logged in and what they are doing"
show_output = true
category = "Linux Essentials"
os = "linux"

[[button]]
id = "last-logins"
name = "Last Logins"
command = "if command -v last >/dev/null; then last -n 20; else out=$(journalctl -q --no-pager -n 50 _COMM=systemd-logind 2>/dev/null); if [ -n \"$out\" ]; then echo \"$out\"; else echo 'No login history available (install the util-linux-extra or wtmpdb package for last).'; fi; fi"
icon_name = "person-check"
color = "#9141ac"
tooltip = "Show recent login/session activity (last, or the systemd journal)"
show_output = true
category = "Linux Essentials"
os = "linux"

[[button]]
id = "failed-services"
name = "Failed Services"
command = "systemctl --failed"
icon_name = "exclamation-triangle"
color = "#f66151"
tooltip = "List all systemd services that have failed — useful for diagnosing broken features"
show_output = true
category = "Linux Essentials"
os = "linux"

[[button]]
id = "system-journal"
name = "System Journal"
command = "journalctl -n 50 --no-pager"
icon_name = "journal-text"
color = "#ffa348"
tooltip = "Show the last 50 lines of the system journal (all services, cross-distro)"
show_output = true
category = "Linux Essentials"
os = "linux"

[[button]]
id = "kernel-messages"
name = "Kernel Messages"
command = "out=$(journalctl -q -k -n 30 --no-pager 2>/dev/null); [ -z \"$out\" ] && out=$(dmesg 2>/dev/null | tail -30); if [ -n \"$out\" ]; then echo \"$out\"; else echo 'Kernel log needs elevated privileges (add your user to the adm group, or run: sudo dmesg).'; fi"
icon_name = "cpu"
color = "#ffa348"
tooltip = "Show the last 30 kernel ring buffer messages (hardware, boot events)"
show_output = true
category = "Linux Essentials"
os = "linux"

[[button]]
id = "clear-trash"
name = "Clear Trash"
command = "rm -rf ~/.local/share/Trash/files/* ~/.local/share/Trash/info/* 2>/dev/null && echo 'Trash cleared.'"
icon_name = "trash"
color = "#865e3c"
tooltip = "Permanently delete all files in the Trash"
confirm_before_run = true
category = "Linux Essentials"
os = "linux"

[[button]]
id = "system-update"
name = "System Update"
command = "bash -c 'if command -v apt >/dev/null 2>&1; then sudo apt update && sudo apt upgrade -y; elif command -v dnf >/dev/null 2>&1; then sudo dnf upgrade -y; elif command -v pacman >/dev/null 2>&1; then sudo pacman -Syu --noconfirm; else echo \"Unknown package manager\"; fi'"
icon_name = "cloud-download"
color = "#62a0ea"
tooltip = "Refresh package lists and upgrade all installed packages (apt / dnf / pacman)"
confirm_before_run = true
execution_mode = "terminal"
category = "Linux Essentials"
os = "linux"

[[button]]
id = "reboot"
name = "Reboot"
command = "systemctl reboot 2>/dev/null || sudo -n systemctl reboot 2>/dev/null || { echo COMMANDECK_NEEDS_ADMIN >&2; echo 'Rebooting over SSH needs admin rights.'; echo 'Easiest fix: save this machine'\\''s SSH password in Commandeck (Machines > edit) - admin actions then work automatically.'; echo 'Alternatives: connect the machine as root, or run sudo visudo and add:'; echo \"  $USER ALL=(ALL) NOPASSWD: /usr/bin/systemctl reboot, /usr/bin/systemctl poweroff\"; exit 1; }"
icon_name = "arrow-clockwise"
color = "#f8e45c"
tooltip = "Reboot the system immediately"
confirm_before_run = true
category = "Linux Essentials"
os = "linux"

[[button]]
id = "shutdown"
name = "Shutdown"
command = "systemctl poweroff 2>/dev/null || sudo -n systemctl poweroff 2>/dev/null || { echo COMMANDECK_NEEDS_ADMIN >&2; echo 'Powering off over SSH needs admin rights.'; echo 'Easiest fix: save this machine'\\''s SSH password in Commandeck (Machines > edit) - admin actions then work automatically.'; echo 'Alternatives: connect the machine as root, or run sudo visudo and add:'; echo \"  $USER ALL=(ALL) NOPASSWD: /usr/bin/systemctl reboot, /usr/bin/systemctl poweroff\"; exit 1; }"
icon_name = "power"
color = "#f66151"
tooltip = "Power off the system immediately"
confirm_before_run = true
category = "Linux Essentials"
os = "linux"

[[button]]
id = "tail-syslog"
name = "Tail Syslog"
command = "tail -n 50 /var/log/syslog 2>/dev/null || journalctl -n 50 --no-pager"
icon_name = "file-text"
color = "#ffa348"
tooltip = "Show the last 50 lines of the system log (syslog or journald)"
show_output = true
category = "Linux Essentials"
os = "linux"
