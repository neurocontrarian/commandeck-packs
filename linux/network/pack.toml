version = 1

[pack]
pack_id = "linux-network"
name = "Network"
pack_ver = "1.4.0"
os = "linux"
category = "Network"
description = "Interfaces, ports and connection diagnostics."
tags = [
    "defaults",
    "network",
]

[[button]]
id = "network-interfaces"
name = "Network Interfaces"
command = "ip addr"
icon_name = "ethernet"
color = "#62a0ea"
tooltip = "Show all network interfaces and their IP addresses"
show_output = true
category = "Network"
os = "linux"

[[button]]
id = "active-connections"
name = "Active Connections"
command = "ss -tp state established"
icon_name = "plug"
color = "#57e389"
tooltip = "Show all active TCP connections and the processes using them"
show_output = true
category = "Network"
os = "linux"

[[button]]
id = "open-ports"
name = "Open Ports"
command = "ss -tulpn"
icon_name = "broadcast"
color = "#57e389"
tooltip = "List all open TCP/UDP ports and the processes using them"
show_output = true
category = "Network"
os = "linux"

[[button]]
id = "listening-services"
name = "Listening Services"
command = "ss -tlnp"
icon_name = "broadcast"
color = "#57e389"
tooltip = "List all services listening on TCP ports"
show_output = true
category = "Network"
os = "linux"

[[button]]
id = "ping"
name = "Ping"
command = "ping -c 4 8.8.8.8"
icon_name = "wifi"
color = "#62a0ea"
tooltip = "Send 4 test packets to a public server to check internet connectivity"
show_output = true
category = "Network"
os = "linux"

[[button]]
id = "wifi-info"
name = "Wi-Fi Info"
command = "nmcli 2>/dev/null || echo 'No Wi-Fi information available (NetworkManager is not running - this machine is probably wired-only).'"
icon_name = "wifi"
color = "#62a0ea"
tooltip = "Show the current Wi-Fi network, IP address and router"
show_output = true
category = "Network"
os = "linux"
